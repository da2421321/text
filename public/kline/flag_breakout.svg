<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 8,4 0,8" fill="#333" />
    </marker>
  </defs>
  <rect width="720" height="420" fill="#fff" />
  <text x="20" y="34" font-size="20" font-family="Arial" fill="#111">旗形整理 → 放量突破</text>

  <!-- 旗杆（强势上攻） -->
  <line x1="120" y1="300" x2="240" y2="160" stroke="#12b886" stroke-width="6" />
  <text x="130" y="315" font-size="12" fill="#0b8c66">旗杆</text>

  <!-- 旗面（斜向小回撤通道） -->
  <line x1="240" y1="160" x2="420" y2="210" stroke="#999" stroke-width="2" />
  <line x1="240" y1="200" x2="420" y2="250" stroke="#999" stroke-width="2" />
  <text x="355" y="245" font-size="12" fill="#666">旗面</text>

  <!-- 突破长阳 -->
  <line x1="460" y1="120" x2="460" y2="280" stroke="#444" stroke-width="3" />
  <rect x="430" y="150" width="60" height="110" fill="#12b886" stroke="#0b8c66" stroke-width="2" />

  <!-- 箭头与标注 -->
  <line x1="420" y1="210" x2="445" y2="185" stroke="#333" marker-end="url(#arrow)" />
  <text x="450" y="182" font-size="14" fill="#111">放量突破</text>
  <line x1="240" y1="160" x2="265" y2="130" stroke="#333" marker-end="url(#arrow)" />
  <text x="270" y="128" font-size="14" fill="#111">先强攻</text>

  <!-- 量能示意 -->
  <rect x="220" y="360" width="30" height="20" fill="#aaa" />
  <rect x="430" y="345" width="60" height="35" fill="#666" />

  <text x="20" y="405" font-size="12" fill="#666">入场：突破旗形上沿；止损：回到旗形内；目标：旗杆等幅测算。</text>
</svg>


